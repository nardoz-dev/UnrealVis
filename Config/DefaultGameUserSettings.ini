; This file provides the default values for Game User Settings.
; The engine saves user-specific settings to GameUserSettings.ini in the user's saved games directory.

[/Script/Engine.GameUserSettings]
; ---------------------------------------------------------------------------------
; Resolution and Window Mode Settings
; ---------------------------------------------------------------------------------

; The resolution the game will be set to on first launch.
ResolutionSizeX=1600
ResolutionSizeY=900

; The last resolution that the user confirmed as working.
LastUserConfirmedResolutionSizeX=1600
LastUserConfirmedResolutionSizeY=900

; Window mode on first launch.
; 0 = Fullscreen
; 1 = Windowed Fullscreen (Borderless)
; 2 = Windowed
FullscreenMode=1
LastConfirmedFullscreenMode=1
PreferredFullscreenMode=1


; ---------------------------------------------------------------------------------
; Performance and Quality Settings (Scalability Groups)
; ---------------------------------------------------------------------------------
; These settings correspond to the "Engine Scalability Settings" in the editor.
; Values typically range from 0 to 3 (sometimes 4 for Cinematic).
; 0 = Low
; 1 = Medium
; 2 = High
; 3 = Epic
; 4 = Cinematic (where applicable)

[ScalabilityGroups]
sg.ResolutionQuality=100.000000
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.GlobalIlluminationQuality=3 ; Important for Lumen in UE5
sg.ReflectionQuality=3      ; Important for Lumen in UE5
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3


; ---------------------------------------------------------------------------------
; VSync and Frame Rate Settings
; ---------------------------------------------------------------------------------

; Toggles VSync on or off. Set to 'false' to allow the FrameRateLimit to take effect.
bUseVSync=false

; Sets the desired frame rate limit. A value of 0.0 means the frame rate is unlimited.
; You can set this to a specific value like 60.0, 120.0, etc.
FrameRateLimit=0.000000


; ---------------------------------------------------------------------------------
; Benchmarking
; ---------------------------------------------------------------------------------
; This should always be false by default. The engine will set it to true
; after running the hardware benchmark for the first time.

bHasRunBenchmark=false